<!DOCTYPE html>
<html>
<head>

<title>Cart - Gupta Traders PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  background:#f4f6fb;
  margin:0;
}

.container{
  width:450px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

#search{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

.item{
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.item img{
  width:50px;
  border-radius:8px;
}

.itemDetails{
  flex:1;
}

textarea, input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-family:'Poppins';
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:#27ae60;
  border:none;
  color:white;
  border-radius:12px;
  cursor:pointer;
  font-weight:500;
}

#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
}

#popupBox{
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

</style>
</head>
<body>

<div class="container">

<h2>Your Cart</h2>

<input type="text" id="search" placeholder="Search product...">

<div id="cartItems"></div>

<textarea id="instructions" placeholder="Special Instructions"></textarea>

<input id="name" placeholder="Order name">

<button onclick="placeOrder()">Place Order</button>
<button onclick="location.href='index.html'">Back To Home</button>
</div>

<div id="popup">
  <div id="popupBox">
    <h3>✅ Order Sent to Godown!</h3>
  </div>
</div>

<audio id="sound">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyCpXTRI-jctSFoWgZh3WT_1DsnvMPSjo4o",
  authDomain:"gupta-traders-a8cd5.firebaseapp.com",
  databaseURL:"https://gupta-traders-a8cd5-default-rtdb.firebaseio.com",
  projectId:"gupta-traders-a8cd5",
  storageBucket:"gupta-traders-a8cd5.firebasestorage.app",
  messagingSenderId:"438114133932",
  appId:"1:438114133932:web:ed5ba17cc97bf00909bc09"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartItemsDiv = document.getElementById("cartItems");
let popup = document.getElementById("popup");

function renderCart(filter=""){

  cartItemsDiv.innerHTML="";

  cart.filter(item => item.name.toLowerCase().includes(filter.toLowerCase())).forEach(i=>{

    cartItemsDiv.innerHTML+=`
      <div class="item">

        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/1046/1046784.png'}">

        <div class="itemDetails">

          <b>${i.name}</b><br>

          ${i.color ? "Color: "+i.color+"<br>" : ""}
          ${i.type ? "Type: "+i.type+"<br>" : ""}


          Weight: ${i.weight}<br>

          Qty: ${i.qty} ${i.unit}<br>

          Special: ${i.instruction || "-"}

        </div>

      </div>
    `;

  });

}

renderCart();

document.getElementById("search").addEventListener("input",(e)=>{
  renderCart(e.target.value);
});

function placeOrder(){

  let customerName = document.getElementById("name").value;
  let instruction = document.getElementById("instructions").value;
function placeOrder(){

localStorage.setItem("orderStatus","pending");

window.location.href="index.html";

}

  if(!customerName){
    alert("Enter order name");
    return;
  }

  push(ref(db,"orders"),{
    customer:customerName,
    items:cart,
    instruction:instruction,
    time:new Date().toLocaleString(),
    status:"pending"
  }).then(()=>{

    popup.style.display="flex";

    setTimeout(()=>{
      popup.style.display="none";
    },2000);

    localStorage.removeItem("cart");
    cart=[];
    renderCart();

  });

}

window.placeOrder = placeOrder;

</script>

</body>
</html>
