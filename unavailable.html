
<!DOCTYPE html>
<html>
<head>

<title>Unavailable Orders</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
text-align:center;
}

.orderBox{
background:white;
width:500px;
margin:20px auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:left;
position:relative;
}

h1{
margin-top:20px;
}

/* close button */

.closeBtn{
position:absolute;
top:10px;
right:15px;
font-size:18px;
cursor:pointer;
color:#999;
}

.closeBtn:hover{
color:red;
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.yesBtn{
background:#e74c3c;
color:white;
}

.noBtn{
background:#777;
color:white;
}

</style>

</head>

<body>

<h1>❌ Unavailable Orders</h1>

<div id="orders"></div>

<!-- Confirmation Popup -->

<div class="popup" id="confirmPopup">

<div class="popup-content">

<h3>Are you sure?</h3>

<p>Do you want to remove this unavailable order?</p>

<button class="yesBtn" onclick="deleteOrder()">Yes</button>
<button class="noBtn" onclick="cancelDelete()">No</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCpXTRI-jctSFoWgZh3WT_1DsnvMPSjo4o",
authDomain: "gupta-traders-a8cd5.firebaseapp.com",
databaseURL: "https://gupta-traders-a8cd5-default-rtdb.firebaseio.com",
projectId: "gupta-traders-a8cd5",
storageBucket: "gupta-traders-a8cd5.firebasestorage.app",
messagingSenderId: "438114133932",
appId: "1:438114133932:web:ed5ba17cc97bf00909bc09"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ordersDiv=document.getElementById("orders");

let orderToDelete=null;

const ordersRef=ref(db,"orders");

onValue(ordersRef,(snapshot)=>{

ordersDiv.innerHTML="";

if(!snapshot.exists()){
ordersDiv.innerHTML="<p>No unavailable orders</p>";
return;
}

snapshot.forEach((child)=>{

let order=child.val();
let orderId=child.key;

if(order.status!="unavailable") return;

let itemsHTML="";

if(order.items){

order.items.forEach(item=>{

itemsHTML+=`
<li>
${item.name}
${item.color ? " - Color: "+item.color : ""}
 - ${item.weight} - ${item.qty} ${item.unit}
</li>
`;

});

}

let instructionHTML="";

if(order.instruction){
instructionHTML=`<p><b>Instruction:</b> ${order.instruction}</p>`;
}

ordersDiv.innerHTML+=`

<div class="orderBox">

<span class="closeBtn" onclick="confirmDelete('${orderId}')">❌</span>

<h3>Customer: ${order.customer}</h3>

<p>Time: ${order.time}</p>

${instructionHTML}

<ul>${itemsHTML}</ul>

</div>

`;

});

});

window.confirmDelete=function(id){

orderToDelete=id;

document.getElementById("confirmPopup").style.display="flex";

}

window.deleteOrder=function(){

if(orderToDelete){

remove(ref(db,"orders/"+orderToDelete));

}

document.getElementById("confirmPopup").style.display="none";

}

window.cancelDelete=function(){

document.getElementById("confirmPopup").style.display="none";

orderToDelete=null;

}

</script>

</body>
</html>
